apply plugin: 'com.android.application'
import org.gradle.api.DefaultTask
import org.gradle.api.tasks.TaskAction

android {
    namespace "com.firefly.forum"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.firefly.forum"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    
    // 修复签名配置
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        
        release {
            storeFile file('firefly-release-key.keystore')
            storePassword 'firefly'
            keyAlias 'firefly-key'
            keyPassword 'firefly'
            // 如果没有keystore文件，将在编译前创建
        }
    }
    
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            debuggable true
            minifyEnabled false
            shrinkResources false
        }
        
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
            debuggable false
        }
    }
    
    // 解决PackageInfo null问题
    packagingOptions {
        resources {
            excludes += [
                'META-INF/DEPENDENCIES', 
                'META-INF/LICENSE', 
                'META-INF/LICENSE.txt', 
                'META-INF/license.txt', 
                'META-INF/NOTICE', 
                'META-INF/NOTICE.txt', 
                'META-INF/notice.txt', 
                'META-INF/ASL2.0',
                'META-INF/*.kotlin_module'
            ]
        }
    }
    
    // 启用Java 21特性
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    
    // 使用更现代的构建特性
    buildFeatures {
        buildConfig true
        viewBinding true
    }
    
    // 修复编译问题
    lint {
        abortOnError false
        checkReleaseBuilds false
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    
    // 主要依赖
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.core:core-ktx:$androidxCoreVersion"
    
    // Material Design 3
    implementation 'com.google.android.material:material:1.11.0'
    
    // Capacitor
    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')
    
    // 测试依赖
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

// 自动创建debug.keystore如果不存在
abstract class CheckDebugKeystoreExistsTask extends DefaultTask {
    private final File keystoreFile
    private final File workingDir
    
    @javax.inject.Inject
    CheckDebugKeystoreExistsTask() {
        keystoreFile = new File(project.projectDir, 'debug.keystore')
        workingDir = project.projectDir
    }
    
    @TaskAction
    def checkExists() {
        if (!keystoreFile.exists()) {
            logger.warn("Debug keystore does not exist, creating it...")
            getProject().exec {
                commandLine 'keytool', '-genkey', '-v', '-keystore', 'debug.keystore', '-storepass', 'android', '-alias', 'androiddebugkey', '-keypass', 'android', '-keyalg', 'RSA', '-keysize', '2048', '-validity', '10000', '-dname', 'CN=Android Debug,O=Android,C=US'
                workingDir workingDir
            }
        }
    }
}

// 自动创建release keystore如果不存在
abstract class CheckReleaseKeystoreExistsTask extends DefaultTask {
    private final File keystoreFile
    private final File workingDir
    
    @javax.inject.Inject
    CheckReleaseKeystoreExistsTask() {
        keystoreFile = new File(project.projectDir, 'firefly-release-key.keystore')
        workingDir = project.projectDir
    }
    
    @TaskAction
    def checkExists() {
        if (!keystoreFile.exists()) {
            logger.warn("Release keystore does not exist, creating it...")
            getProject().exec {
                commandLine 'keytool', '-genkey', '-v', '-keystore', 'firefly-release-key.keystore', '-storepass', 'firefly', '-alias', 'firefly-key', '-keypass', 'firefly', '-keyalg', 'RSA', '-keysize', '2048', '-validity', '10000', '-dname', 'CN=Firefly Forum,O=Firefly,C=CN'
                workingDir workingDir
            }
        }
    }
}

tasks.register('checkDebugKeystoreExists', CheckDebugKeystoreExistsTask)
tasks.register('checkReleaseKeystoreExists', CheckReleaseKeystoreExistsTask)

preBuild.dependsOn checkDebugKeystoreExists
preBuild.dependsOn checkReleaseKeystoreExists
